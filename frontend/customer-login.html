<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập / Đăng ký - MyShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/shop-front.css">
</head>
<body>
    <header class="shop-header">
        <div class="container">
            <a href="/" class="shop-logo"><svg width="32" height="32" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="12" fill="url(#lg)"/><path d="M14 18h20l-2 16H16L14 18z" stroke="#fff" stroke-width="2" fill="none"/><path d="M18 18V14a6 6 0 0112 0v4" stroke="#fff" stroke-width="2" fill="none"/><defs><linearGradient id="lg" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs></svg><span>MyShop</span></a>
        </div>
    </header>

    <section class="auth-section">
        <div class="auth-card">
            <div class="auth-tabs">
                <button class="tab active" onclick="switchTab('login')">Đăng nhập</button>
                <button class="tab" onclick="switchTab('register')">Đăng ký</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" name="username" required placeholder="Nhập username">
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" name="password" required placeholder="Nhập mật khẩu">
                </div>
                <p class="auth-error" id="loginError"></p>
                <button type="submit" class="btn-primary btn-block">Đăng nhập</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form" style="display:none;">
                <div class="form-group">
                    <label>Họ và tên</label>
                    <input type="text" name="full_name" required placeholder="Nguyễn Văn A">
                </div>
                <div class="form-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" name="username" required placeholder="Chọn username">
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" name="password" required placeholder="Ít nhất 3 ký tự">
                </div>
                <p class="auth-error" id="registerError"></p>
                <button type="submit" class="btn-primary btn-block">Đăng ký</button>
            </form>

            <p style="text-align:center;margin-top:15px;"><a href="/" class="btn-text">← Quay lại trang chủ</a></p>
        </div>
    </section>

    <script src="/js/auth-manager.js"></script>
    <script src="/js/cart-manager.js"></script>
    <script>
        const redirect = new URLSearchParams(window.location.search).get('redirect') || '/';

        if (AuthManager.isAuthenticated()) window.location.href = redirect;

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab:nth-child(${tab === 'login' ? 1 : 2})`).classList.add('active');
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            try {
                const res = await fetch('/api/customer-auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-ID': CartManager.getSessionId() },
                    body: JSON.stringify(Object.fromEntries(fd))
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                AuthManager.setAuth(data.token, data.user);
                window.location.href = redirect;
            } catch (err) {
                document.getElementById('loginError').textContent = err.message;
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            try {
                const res = await fetch('/api/customer-auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-ID': CartManager.getSessionId() },
                    body: JSON.stringify(Object.fromEntries(fd))
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                AuthManager.setAuth(data.token, data.user);
                window.location.href = redirect;
            } catch (err) {
                document.getElementById('registerError').textContent = err.message;
            }
        });
    </script>
</body>
</html>
