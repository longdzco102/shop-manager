<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - MyShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/shop-front.css">
</head>
<body>
    <header class="shop-header">
        <div class="container">
            <a href="/" class="shop-logo"><svg width="32" height="32" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="12" fill="url(#lg)"/><path d="M14 18h20l-2 16H16L14 18z" stroke="#fff" stroke-width="2" fill="none"/><path d="M18 18V14a6 6 0 0112 0v4" stroke="#fff" stroke-width="2" fill="none"/><defs><linearGradient id="lg" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs></svg><span>MyShop</span></a>
        </div>
    </header>

    <section class="checkout-section">
        <div class="container">
            <h1>📦 Thanh toán đơn hàng</h1>
            <div class="checkout-grid">
                <form id="checkoutForm" class="checkout-form">
                    <h3>Thông tin giao hàng</h3>
                    <div class="form-group">
                        <label for="shippingName">Họ tên người nhận</label>
                        <input type="text" id="shippingName" name="shipping_name" required placeholder="Nguyễn Văn A">
                    </div>
                    <div class="form-group">
                        <label for="shippingPhone">Số điện thoại</label>
                        <input type="tel" id="shippingPhone" name="shipping_phone" required placeholder="0901234567">
                    </div>
                    <div class="form-group">
                        <label for="shippingAddress">Địa chỉ giao hàng</label>
                        <textarea id="shippingAddress" name="shipping_address" required placeholder="Số nhà, đường, phường/xã, quận/huyện, tỉnh/thành"></textarea>
                    </div>

                    <h3>Mã giảm giá</h3>
                    <div class="discount-row">
                        <input type="text" id="discountCode" placeholder="Nhập mã giảm giá">
                        <button type="button" class="btn-outline" onclick="applyDiscount()">Áp dụng</button>
                    </div>
                    <p class="discount-msg" id="discountMsg"></p>

                    <div class="order-summary" id="orderSummary">
                        <div class="summary-row"><span>Tạm tính:</span><span id="subtotal">0đ</span></div>
                        <div class="summary-row discount-line" id="discountLine" style="display:none;"><span>Giảm giá:</span><span id="discountAmountDisplay">-0đ</span></div>
                        <div class="summary-row total"><span>Tổng thanh toán:</span><strong id="finalTotal">0đ</strong></div>
                    </div>

                    <button type="submit" class="btn-primary btn-block btn-lg">🛒 Đặt hàng</button>
                </form>

                <div class="checkout-items" id="checkoutItems">
                    <h3>Sản phẩm trong giỏ</h3>
                    <div id="itemsList"></div>
                </div>
            </div>
        </div>
    </section>

    <script src="/js/auth-manager.js"></script>
    <script src="/js/cart-manager.js"></script>
    <script>
        let cartData = null;
        let appliedDiscount = null;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!AuthManager.isAuthenticated()) {
                window.location.href = '/customer-login.html?redirect=/checkout.html';
                return;
            }
            cartData = await CartManager.getCart();
            if (!cartData.items || cartData.items.length === 0) {
                window.location.href = '/cart.html';
                return;
            }
            renderItems();
            updateTotals();
        });

        function renderItems() {
            document.getElementById('itemsList').innerHTML = cartData.items.map(i => `
                <div class="checkout-item">
                    <img src="${i.image_url || 'https://placehold.co/50x50/1a1a2e/fff?text=SP'}">
                    <div><strong>${i.name}</strong><br>${i.quantity} x ${Number(i.final_price).toLocaleString('vi-VN')}đ</div>
                    <span>${Number(i.subtotal).toLocaleString('vi-VN')}đ</span>
                </div>
            `).join('');
        }

        function updateTotals() {
            const subtotal = cartData.total;
            const discountAmt = appliedDiscount ? appliedDiscount.discountAmount : 0;
            const final = subtotal - discountAmt;
            document.getElementById('subtotal').textContent = Number(subtotal).toLocaleString('vi-VN') + 'đ';
            document.getElementById('finalTotal').textContent = Number(final).toLocaleString('vi-VN') + 'đ';
            if (discountAmt > 0) {
                document.getElementById('discountLine').style.display = 'flex';
                document.getElementById('discountAmountDisplay').textContent = '-' + Number(discountAmt).toLocaleString('vi-VN') + 'đ';
            }
        }

        async function applyDiscount() {
            const code = document.getElementById('discountCode').value.trim();
            if (!code) return;
            const msg = document.getElementById('discountMsg');
            try {
                const res = await fetch('/api/discounts/validate', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, orderAmount: cartData.total })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                appliedDiscount = data;
                msg.textContent = `✅ Áp dụng thành công: ${data.discount.name}`;
                msg.style.color = '#22c55e';
                updateTotals();
            } catch (err) {
                msg.textContent = '❌ ' + err.message;
                msg.style.color = '#ef4444';
                appliedDiscount = null;
                updateTotals();
            }
        }

        document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type=submit]');
            btn.disabled = true; btn.textContent = 'Đang xử lý...';
            try {
                const body = {
                    shipping_name: document.getElementById('shippingName').value,
                    shipping_phone: document.getElementById('shippingPhone').value,
                    shipping_address: document.getElementById('shippingAddress').value,
                    discount_code: appliedDiscount ? document.getElementById('discountCode').value : undefined
                };
                const res = await fetch('/api/shop/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + AuthManager.getToken() },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                alert('🎉 ' + data.message + '\nTổng: ' + Number(data.finalAmount).toLocaleString('vi-VN') + 'đ');
                window.location.href = '/customer-orders.html';
            } catch (err) {
                alert('❌ Lỗi: ' + err.message);
                btn.disabled = false; btn.textContent = '🛒 Đặt hàng';
            }
        });
    </script>
</body>
</html>
