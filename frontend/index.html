<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hệ thống quản lý cửa hàng - Dashboard, sản phẩm, bán hàng, chi phí, báo cáo">
    <title>Shop Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>

<body>
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-container">
            <div class="login-glow"></div>
            <div class="login-card">
                <div class="login-header">
                    <div class="login-logo">
                        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                            <rect width="48" height="48" rx="12" fill="url(#logo-grad)" />
                            <path d="M14 18h20l-2 16H16L14 18z" stroke="white" stroke-width="2" fill="none" />
                            <path d="M18 18V14a6 6 0 0112 0v4" stroke="white" stroke-width="2" fill="none" />
                            <circle cx="24" cy="28" r="3" fill="white" opacity="0.8" />
                            <defs>
                                <linearGradient id="logo-grad" x1="0" y1="0" x2="48" y2="48">
                                    <stop offset="0%" stop-color="#6366f1" />
                                    <stop offset="100%" stop-color="#8b5cf6" />
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <h1>Shop Manager</h1>
                    <p>Đăng nhập để tiếp tục</p>
                </div>
                <form id="login-form" onsubmit="return false;">
                    <div class="form-group">
                        <label for="login-username">Tên đăng nhập</label>
                        <input type="text" id="login-username" placeholder="Nhập username" autocomplete="username"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Mật khẩu</label>
                        <input type="password" id="login-password" placeholder="Nhập mật khẩu"
                            autocomplete="current-password" required>
                    </div>
                    <div id="login-error" class="form-error" style="display:none;"></div>
                    <button type="submit" id="login-btn" class="btn btn-primary btn-block">
                        <span>Đăng nhập</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7" />
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="app" style="display:none;">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
                        <rect width="48" height="48" rx="12" fill="url(#logo-grad2)" />
                        <path d="M14 18h20l-2 16H16L14 18z" stroke="white" stroke-width="2" fill="none" />
                        <path d="M18 18V14a6 6 0 0112 0v4" stroke="white" stroke-width="2" fill="none" />
                        <defs>
                            <linearGradient id="logo-grad2" x1="0" y1="0" x2="48" y2="48">
                                <stop offset="0%" stop-color="#6366f1" />
                                <stop offset="100%" stop-color="#8b5cf6" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <span>Shop Manager</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard" id="nav-dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" rx="1" />
                        <rect x="14" y="3" width="7" height="7" rx="1" />
                        <rect x="3" y="14" width="7" height="7" rx="1" />
                        <rect x="14" y="14" width="7" height="7" rx="1" />
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-page="products" id="nav-products">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                    </svg>
                    <span>Sản phẩm</span>
                </a>
                <a href="#" class="nav-item" data-page="sales" id="nav-sales">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="21" r="1" />
                        <circle cx="20" cy="21" r="1" />
                        <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6" />
                    </svg>
                    <span>Bán hàng</span>
                </a>
                <a href="#" class="nav-item" data-page="procurements" id="nav-procurements">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 8l-2-2H5L3 8V21h18V8zM3 10h18M16 5l-1-1H9L8 5" />
                    </svg>
                    <span>Nhập hàng</span>
                </a>
                <a href="#" class="nav-item" data-page="expenses" id="nav-expenses">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="1" x2="12" y2="23" />
                        <path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" />
                    </svg>
                    <span>Chi phí</span>
                </a>
                <a href="#" class="nav-item" data-page="attendance" id="nav-attendance">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>
                    <span>Chấm công</span>
                </a>
                <a href="#" class="nav-item" data-page="reports" id="nav-reports">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="20" x2="18" y2="10" />
                        <line x1="12" y1="20" x2="12" y2="4" />
                        <line x1="6" y1="20" x2="6" y2="14" />
                    </svg>
                    <span>Báo cáo</span>
                </a>
                <a href="#" class="nav-item admin-only" data-page="users" id="nav-users" style="display:none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 00-3-3.87" />
                        <path d="M16 3.13a4 4 0 010 7.75" />
                    </svg>
                    <span>Nhân viên</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">A</div>
                    <div class="user-details">
                        <span class="user-name" id="user-name">Admin</span>
                        <span class="user-role" id="user-role">admin</span>
                    </div>
                </div>
                <button class="btn-icon" id="logout-btn" title="Đăng xuất">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
                        <polyline points="16,17 21,12 16,7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <button class="btn-icon sidebar-toggle" id="sidebar-toggle">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12" />
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="18" x2="21" y2="18" />
                    </svg>
                </button>
                <h2 id="page-title">Dashboard</h2>
                <div class="topbar-right">
                    <span class="badge" id="role-badge">Admin</span>
                </div>
            </header>
            <div class="content-area" id="content-area">
                <!-- Dynamic content loaded here -->
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay" style="display:none;">
        <div class="modal" id="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Modal</h3>
                <button class="btn-icon modal-close" id="modal-close">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast-container" class="toast-container"></div>

    <script src="js/app.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/products.js"></script>
    <script src="js/pages/sales.js"></script>
    <script src="js/pages/expenses.js"></script>
    <script src="js/pages/procurements.js"></script>
    <script src="js/pages/reports.js"></script>
    <script src="js/pages/attendance.js"></script>
    <script src="js/pages/users.js"></script>
</body>

</html>
