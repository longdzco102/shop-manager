<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đơn hàng của tôi - MyShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/shop-front.css">
</head>
<body>
    <header class="shop-header">
        <div class="container">
            <a href="/" class="shop-logo"><svg width="32" height="32" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="12" fill="url(#lg)"/><path d="M14 18h20l-2 16H16L14 18z" stroke="#fff" stroke-width="2" fill="none"/><path d="M18 18V14a6 6 0 0112 0v4" stroke="#fff" stroke-width="2" fill="none"/><defs><linearGradient id="lg" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs></svg><span>MyShop</span></a>
            <nav class="shop-nav">
                <a href="/" class="nav-link">Trang chủ</a>
                <a href="/cart.html" class="nav-link cart-link">🛒 Giỏ hàng</a>
            </nav>
            <div class="shop-auth" id="authArea">
                <div class="user-menu" id="userMenu">
                    <span class="user-greeting" id="userGreeting"></span>
                    <button class="btn-text" id="logoutBtn">Đăng xuất</button>
                </div>
            </div>
        </div>
    </header>

    <section class="orders-section">
        <div class="container">
            <h1>📋 Đơn hàng của tôi</h1>
            <div id="ordersContent"><div class="loading-spinner">Đang tải...</div></div>
        </div>
    </section>

    <script src="/js/auth-manager.js"></script>
    <script src="/js/cart-manager.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!AuthManager.isAuthenticated()) { window.location.href = '/customer-login.html?redirect=/customer-orders.html'; return; }
            AuthManager.updateUI();
            loadOrders();
        });

        async function loadOrders() {
            try {
                const res = await fetch('/api/shop/my-orders', {
                    headers: { 'Authorization': 'Bearer ' + AuthManager.getToken() }
                });
                const orders = await res.json();
                const container = document.getElementById('ordersContent');

                if (!orders.length) {
                    container.innerHTML = '<div class="empty-cart"><h3>Chưa có đơn hàng</h3><a href="/" class="btn-primary">Mua sắm ngay</a></div>';
                    return;
                }

                const statusMap = { pending: '⏳ Chờ xử lý', completed: '✅ Hoàn thành', cancelled: '❌ Đã huỷ' };
                const statusClass = { pending: 'pending', completed: 'completed', cancelled: 'cancelled' };

                container.innerHTML = orders.map(o => `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="order-id">#${o.id}</span>
                            <span class="order-status ${statusClass[o.status] || ''}">${statusMap[o.status] || o.status}</span>
                        </div>
                        <div class="order-info">
                            <span>📅 ${new Date(o.created_at).toLocaleDateString('vi-VN')}</span>
                            <span>📦 ${o.item_count} sản phẩm</span>
                            ${o.discount_code ? `<span>🏷️ ${o.discount_code} (-${Number(o.discount_amount).toLocaleString('vi-VN')}đ)</span>` : ''}
                        </div>
                        <div class="order-total">Tổng: <strong>${Number(o.total).toLocaleString('vi-VN')}đ</strong></div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('ordersContent').innerHTML = '<p>Lỗi tải đơn hàng</p>';
            }
        }
    </script>
</body>
</html>
