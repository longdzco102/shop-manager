<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - MyShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/shop-front.css">
</head>
<body>
    <header class="shop-header">
        <div class="container">
            <a href="/" class="shop-logo"><svg width="32" height="32" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="12" fill="url(#lg)"/><path d="M14 18h20l-2 16H16L14 18z" stroke="#fff" stroke-width="2" fill="none"/><path d="M18 18V14a6 6 0 0112 0v4" stroke="#fff" stroke-width="2" fill="none"/><defs><linearGradient id="lg" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs></svg><span>MyShop</span></a>
            <nav class="shop-nav">
                <a href="/" class="nav-link">Trang chủ</a>
                <a href="/cart.html" class="nav-link active cart-link">🛒 Giỏ hàng <span class="cart-badge" id="cartBadge">0</span></a>
            </nav>
            <div class="shop-auth" id="authArea">
                <a href="/customer-login.html" class="btn-outline" id="loginLink">Đăng nhập</a>
                <div class="user-menu" id="userMenu" style="display:none;">
                    <span class="user-greeting" id="userGreeting"></span>
                    <button class="btn-text" id="logoutBtn">Đăng xuất</button>
                </div>
            </div>
        </div>
    </header>

    <section class="cart-section">
        <div class="container">
            <h1>🛒 Giỏ hàng của bạn</h1>
            <div id="cartContent">
                <div class="loading-spinner">Đang tải...</div>
            </div>
            <div class="cart-summary" id="cartSummary" style="display:none;">
                <div class="summary-row"><span>Tổng cộng:</span><strong id="cartTotal">0đ</strong></div>
                <button class="btn-primary btn-block" onclick="goToCheckout()">Tiến hành thanh toán →</button>
                <a href="/" class="btn-text" style="display:block;text-align:center;margin-top:10px;">← Tiếp tục mua sắm</a>
            </div>
        </div>
    </section>

    <script src="/js/auth-manager.js"></script>
    <script src="/js/cart-manager.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            AuthManager.updateUI();
            loadCart();
        });

        async function loadCart() {
            try {
                const cart = await CartManager.getCart();
                const container = document.getElementById('cartContent');
                const summary = document.getElementById('cartSummary');

                if (!cart.items || cart.items.length === 0) {
                    container.innerHTML = '<div class="empty-cart"><h3>Giỏ hàng trống</h3><p>Hãy thêm sản phẩm để bắt đầu mua sắm!</p><a href="/" class="btn-primary">Mua sắm ngay</a></div>';
                    summary.style.display = 'none';
                    return;
                }

                container.innerHTML = cart.items.map(item => `
                    <div class="cart-item">
                        <img src="${item.image_url || 'https://placehold.co/80x80/1a1a2e/fff?text=SP'}" alt="${item.name}">
                        <div class="item-info">
                            <h4>${item.name}</h4>
                            <p class="item-price">${Number(item.final_price).toLocaleString('vi-VN')}đ</p>
                            ${item.discount_percentage ? `<span class="discount-tag">-${item.discount_percentage}%</span>` : ''}
                        </div>
                        <div class="item-qty">
                            <button onclick="updateQty(${item.id}, ${item.quantity - 1})">−</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateQty(${item.id}, ${item.quantity + 1})">+</button>
                        </div>
                        <div class="item-subtotal">${Number(item.subtotal).toLocaleString('vi-VN')}đ</div>
                        <button class="btn-remove" onclick="removeItem(${item.id})">✕</button>
                    </div>
                `).join('');

                document.getElementById('cartTotal').textContent = Number(cart.total).toLocaleString('vi-VN') + 'đ';
                summary.style.display = 'block';
                document.getElementById('cartBadge').textContent = cart.itemCount;
            } catch (err) {
                document.getElementById('cartContent').innerHTML = '<p>Lỗi tải giỏ hàng</p>';
            }
        }

        async function updateQty(id, qty) {
            if (qty <= 0) { removeItem(id); return; }
            await CartManager.updateQuantity(id, qty);
            loadCart();
        }

        async function removeItem(id) {
            await CartManager.removeItem(id);
            loadCart();
        }

        function goToCheckout() {
            if (!AuthManager.isAuthenticated()) {
                alert('Vui lòng đăng nhập để tiếp tục thanh toán');
                window.location.href = '/customer-login.html?redirect=/checkout.html';
                return;
            }
            window.location.href = '/checkout.html';
        }
    </script>
</body>
</html>
