<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa hàng Mua sắm Online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/shop.css">
</head>

<body>
    <header class="shop-header">
        <div class="container header-container">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <path d="M16 10a4 4 0 0 1-8 0" />
                </svg>
                My Shop
            </div>
            <div class="cart-icon" id="cart-toggle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="9" cy="21" r="1" />
                    <circle cx="20" cy="21" r="1" />
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
                </svg>
                <span class="cart-badge" id="cart-count">0</span>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="hero">
            <h1>Sản phẩm nổi bật</h1>
            <p>Khám phá các sản phẩm chất lượng cao với giá tốt nhất.</p>
        </div>

        <div id="product-list" class="product-grid">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </main>

    <!-- Cart Sidebar -->
    <div class="cart-overlay" id="cart-overlay">
        <div class="cart-sidebar">
            <div class="cart-header">
                <h2>Giỏ hàng của bạn</h2>
                <button class="close-cart" id="close-cart">&times;</button>
            </div>
            <div class="cart-items" id="cart-items">
                <!-- Items go here -->
            </div>
            <div class="cart-footer">
                <div class="cart-total">
                    <span>Tổng cộng:</span>
                    <span id="cart-total-price">0 đ</span>
                </div>

                <div class="checkout-form" id="checkout-form-container" style="display: none;">
                    <h3>Thông tin đặt hàng</h3>
                    <input type="text" id="customer-name" placeholder="Họ và tên" required>
                    <input type="tel" id="customer-phone" placeholder="Số điện thoại" required>
                    <button class="btn btn-primary btn-block" id="btn-submit-order">Xác nhận Đặt hàng</button>
                </div>

                <button class="btn btn-primary btn-block" id="btn-checkout">Tiến hành Đặt hàng</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast-container" class="toast-container"></div>

    <script src="js/shop.js"></script>
</body>

</html>
